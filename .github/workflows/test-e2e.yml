name: E2E Tests

on:
  push:
  pull_request:

permissions: {}

jobs:
  test-e2e:
    permissions:
      contents: read
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Install KIND
        run: |
          arch="$(go env GOARCH)"
          case "${arch}" in
            amd64) checksum="50030de23cf40a18505f20426f6a8506bedf13c6e509244bd1fa9463721b0f54" ;;
            arm64) checksum="b92cd615e97585de8ddade28ed5cd7feb4248d717c233eea5b03c37298900f5d" ;;
            *) echo "unsupported architecture ${arch}" >&2; exit 1 ;;
          esac
          curl -fL --retry 5 -o ./kind \
            "https://github.com/kubernetes-sigs/kind/releases/download/v0.32.0/kind-linux-${arch}"
          echo "${checksum}  ./kind" | sha256sum -c -
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Run four-cluster conformance
        env:
          ARTIFACT_DIR: artifacts/e2e
        run: make test-e2e

      - name: Upload cluster diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: four-cluster-diagnostics
          path: artifacts/e2e
          if-no-files-found: ignore
