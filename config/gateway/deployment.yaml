apiVersion: apps/v1
kind: Deployment
metadata:
  name: mspsql-wireguard
spec:
  replicas: 2
  strategy:
    rollingUpdate: {maxUnavailable: 1, maxSurge: 1}
  selector:
    matchLabels: {app.kubernetes.io/name: mspsql-wireguard}
  template:
    metadata:
      labels: {app.kubernetes.io/name: mspsql-wireguard}
    spec:
      serviceAccountName: mspsql-wireguard
      containers:
      - name: lease-gate
        image: lease-gate
        env:
        - name: POD_NAME
          valueFrom: {fieldRef: {fieldPath: metadata.name}}
        - name: POD_NAMESPACE
          valueFrom: {fieldRef: {fieldPath: metadata.namespace}}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities: {drop: [ALL]}
        volumeMounts:
        - {name: runtime, mountPath: /run/mspsql}
      - name: wireguard
        image: wireguard-go
        command:
        - /bin/sh
        - -ec
        - |
          while [ ! -f /run/mspsql/leader ]; do sleep 1; done
          mkdir -p /run/mspsql/wireguard
          cat /etc/wireguard/interface.conf /etc/wireguard-peers/peers.conf \
            > /run/mspsql/wireguard/wg0.conf
          wireguard-go wg0
          wg-quick up /run/mspsql/wireguard/wg0.conf
          hub_address="$(awk '/^Address/ {split($3, address, "/"); print address[1]}' \
            /etc/wireguard/interface.conf)"
          socat TCP-LISTEN:9444,bind="${hub_address}",reuseaddr,fork \
            TCP:mspsql-agent-control:9444 &
          while true; do
            sleep 5
            cat /etc/wireguard/interface.conf /etc/wireguard-peers/peers.conf \
              > /run/mspsql/wireguard/wg0.next
            if ! cmp -s /run/mspsql/wireguard/wg0.conf /run/mspsql/wireguard/wg0.next; then
              wg-quick strip /run/mspsql/wireguard/wg0.next \
                > /run/mspsql/wireguard/wg0.sync
              wg syncconf wg0 /run/mspsql/wireguard/wg0.sync
              mv /run/mspsql/wireguard/wg0.next /run/mspsql/wireguard/wg0.conf
            fi
          done
        ports:
        - {name: wireguard, containerPort: 51820, protocol: UDP}
        readinessProbe:
          exec: {command: [/bin/sh, -ec, "test -f /run/mspsql/leader && wg show wg0 >/dev/null"]}
          periodSeconds: 2
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
            add: [NET_ADMIN]
        resources:
          requests: {multisite-postgres.dev/tun: 1}
          limits: {multisite-postgres.dev/tun: 1}
        volumeMounts:
        - {name: runtime, mountPath: /run/mspsql}
        - {name: wireguard-runtime, mountPath: /run/wireguard}
        - {name: identity, mountPath: /etc/wireguard, readOnly: true}
        - {name: peers, mountPath: /etc/wireguard-peers, readOnly: true}
      volumes:
      - {name: runtime, emptyDir: {medium: Memory}}
      - {name: wireguard-runtime, emptyDir: {medium: Memory}}
      - name: identity
        secret: {secretName: mspsql-wireguard-identity, defaultMode: 0400}
      - name: peers
        configMap: {name: mspsql-wireguard-peers}
