# This rule is not used by the project mspsql itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over multisite-postgres.multisite-postgres.dev.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: mspsql
    app.kubernetes.io/managed-by: kustomize
  name: postgresrestore-admin-role
rules:
- apiGroups:
  - multisite-postgres.multisite-postgres.dev
  resources:
  - postgresrestores
  verbs:
  - '*'
- apiGroups:
  - multisite-postgres.multisite-postgres.dev
  resources:
  - postgresrestores/status
  verbs:
  - get
