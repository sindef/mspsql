# This rule is not used by the project mspsql itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the multisite-postgres.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: mspsql
    app.kubernetes.io/managed-by: kustomize
  name: postgresupgrade-editor-role
rules:
- apiGroups:
  - multisite-postgres.dev
  resources:
  - postgresupgrades
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - multisite-postgres.dev
  resources:
  - postgresupgrades/status
  verbs:
  - get
