apiVersion: multisite-postgres.dev/v1alpha1
kind: PostgresRestore
metadata:
  labels:
    app.kubernetes.io/name: mspsql
    app.kubernetes.io/managed-by: kustomize
  name: orders-restore
  namespace: database-platform
spec:
  sourceInstanceRef: orders
  targetInstanceRef: orders-recovered
  targetTime: "2026-07-16T02:15:00Z"
  targetBackup:
    repository:
      type: S3
      bucket: database-backups
      prefix: orders-recovered
      endpoint: https://s3.example.internal
      credentialVaultRef:
        mount: secret
        path: postgres/orders-recovered/pgbackrest
