apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
spec:
  template:
    spec:
      containers:
      - name: manager
        args:
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --control-address=:9444
        - --registration-public-url=http://HUB_NODE_IP:30082
        - --hub-control-address=10.254.0.1:9444
        - --hub-domain=kind.mspsql.test
        - --site-agent-image=SITE_AGENT_IMAGE
        - --wireguard-image=WIREGUARD_IMAGE
        - --wireguard-endpoint=WIREGUARD_ENDPOINT
        env:
        - {name: ENABLE_WEBHOOKS, value: "false"}
        ports:
        - {name: grpc, containerPort: 9444, protocol: TCP}
        - {name: registration, containerPort: 8082, protocol: TCP}
        volumeMounts:
        - {name: control-tls, mountPath: /etc/mspsql/control, readOnly: true}
      volumes:
      - name: control-tls
        secret:
          secretName: mspsql-control-tls
