apiVersion: v1
kind: Service
metadata:
  name: controller-external
spec:
  type: NodePort
  selector:
    control-plane: controller-manager
  ports:
  - name: registration
    port: 8082
    targetPort: 8082
    nodePort: 30082
  - name: control
    port: 9444
    targetPort: 9444
    nodePort: 30444
