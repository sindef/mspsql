apiVersion: multisite-postgres.dev/v1alpha1
kind: PostgresDatabase
metadata:
  name: orders-api
  namespace: database-platform
spec:
  instanceRef: orders
  databaseName: orders
  deletionPolicy: Retain
  schemas: [orders]
  roles:
  - {name: orders_owner, profile: Owner}
  - {name: orders_rw, profile: ReadWrite}
  - {name: orders_ro, profile: ReadOnly}
---
apiVersion: multisite-postgres.dev/v1alpha1
kind: PostgresUser
metadata:
  name: orders-application
  namespace: database-platform
spec:
  instanceRef: orders
  roleName: orders_app
  deletionPolicy: Retain
  memberOf:
  - {databaseRef: orders-api, role: orders_rw}
  passwordVaultRef:
    mount: mspsql
    path: postgres/orders/users/orders-app
    key: password
  quotas:
    connectionLimit: 10
